<!DOCTYPE html>
<html lang="en">
<head>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="navigation.css">
<link rel="stylesheet" href="Apply.css">

<title>Apply - Hot Beans</title>
<link rel="icon" type="image/png" href="assets/logo.png">

</head>

<body>

<!-- Navigation -->
<div class="navigation-Bar">
    <div class="logo">
        <a href="index.html"><img src="assets/logo.png" alt="logo"></a>
        <a href="index.html"><h1>Hot Beans</h1></a>
    </div>

    <ul class="nav-links" id="nav-links">
        <li><a href="Team.html">Team</a></li>
        <li><a href="Jobs.html">Jobs</a></li>
        <li><a href="Courses.html">Courses</a></li>
    </ul>

    <button class="apply-btn"><a href="Apply.html">Apply</a></button>

    <button class="hamburger" id="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
    </button>
</div>

<!-- Title -->
<div class="title">
    <h1>Apply</h1>
</div>

<!-- Form -->
<div class="apply-form">
<form>

<div class="form-group">
<label for="job-title">Job Title</label>
<select id="job-title">
<option value="" disabled selected>Select a role...</option>
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Fullstack Developer</option>
<option>DevOps Engineer</option>
<option>UI/UX Designer</option>
<option>JavaScript Developer</option>
<option>React Developer</option>
<option>Python Developer</option>
</select>
</div>

<div class="form-row">
<div class="form-group">
<label>First Name</label>
<input type="text" id="first-name" placeholder="John">
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" id="last-name" placeholder="Doe">
</div>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="john@example.com">
</div>

<!-- CV Upload -->
<div class="form-group">
  <label for="cv-upload">Upload CV</label>
  <div class="cv-dropzone" id="cv-dropzone">
    <input type="file" id="cv-upload" accept=".pdf,.doc,.docx" hidden>
    <div class="cv-dropzone-inner" id="cv-dropzone-inner">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9a8fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p class="cv-label-main">Drag & drop your CV here</p>
      <p class="cv-label-sub">or <span class="cv-browse-link" id="cv-browse-link">browse files</span></p>
      <p class="cv-label-formats">PDF, DOC, DOCX — max 5MB</p>
    </div>
    <div class="cv-file-info" id="cv-file-info" style="display:none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9a8fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span id="cv-file-name">filename.pdf</span>
      <button type="button" class="cv-remove-btn" id="cv-remove-btn">✕</button>
    </div>
  </div>
</div>

<button type="submit" class="submit-btn" id="submit-btn">
Submit Application
</button>

</form>
</div>

<footer>
<p>© 2026 Hot Beans Web</p>
</footer>

<!-- Scripts -->
<script>
const btn = document.getElementById('hamburger-btn');
const nav = document.getElementById('nav-links');

btn.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    btn.classList.toggle('open');
});

// ── CV Upload Logic ──
const dropzone     = document.getElementById('cv-dropzone');
const fileInput    = document.getElementById('cv-upload');
const browseLink   = document.getElementById('cv-browse-link');
const dropInner    = document.getElementById('cv-dropzone-inner');
const fileInfo     = document.getElementById('cv-file-info');
const fileNameSpan = document.getElementById('cv-file-name');
const removeBtn    = document.getElementById('cv-remove-btn');

const ALLOWED = ['application/pdf',
  'application/msword',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
const MAX_MB = 5;

function showFile(file) {
  fileNameSpan.textContent = file.name;
  dropInner.style.display = 'none';
  fileInfo.style.display  = 'flex';
  dropzone.classList.add('has-file');
}

function clearFile() {
  fileInput.value = '';
  dropInner.style.display = 'flex';
  fileInfo.style.display  = 'none';
  dropzone.classList.remove('has-file', 'drag-over');
}

function handleFile(file) {
  if (!file) return;
  if (!ALLOWED.includes(file.type)) {
    alert('Please upload a PDF, DOC, or DOCX file.');
    return;
  }
  if (file.size > MAX_MB * 1024 * 1024) {
    alert(`File is too large. Maximum size is ${MAX_MB}MB.`);
    return;
  }
  showFile(file);
}

browseLink.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('click', (e) => {
  if (!fileInfo.style.display || fileInfo.style.display === 'none') fileInput.click();
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

removeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  clearFile();
});

dropzone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropzone.classList.add('drag-over');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ── Validation helpers ──
function setError(inputEl, msg) {
  const group = inputEl.closest('.form-group');
  inputEl.classList.add('input-error');
  let err = group.querySelector('.field-error');
  if (!err) {
    err = document.createElement('span');
    err.className = 'field-error';
    group.appendChild(err);
  }
  err.textContent = msg;
}

function setErrorById(id, msg) {
  setError(document.getElementById(id), msg);
}

function clearError(inputEl) {
  inputEl.classList.remove('input-error');
  const err = inputEl.closest('.form-group')?.querySelector('.field-error');
  if (err) err.textContent = '';
}

function setCVError(msg) {
  dropzone.classList.add('cv-error');
  let err = dropzone.closest('.form-group').querySelector('.field-error');
  if (!err) {
    err = document.createElement('span');
    err.className = 'field-error';
    dropzone.closest('.form-group').appendChild(err);
  }
  err.textContent = msg;
}

function clearCVError() {
  dropzone.classList.remove('cv-error');
  const err = dropzone.closest('.form-group')?.querySelector('.field-error');
  if (err) err.textContent = '';
}

// Clear errors on input
['first-name','last-name','email','job-title'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() { clearError(this); });
});

// ── Name validation ──
const namePattern = /^[A-Za-z\s'\-]{2,}$/;

function validateName(value, fieldLabel) {
  if (!value.trim()) return `${fieldLabel} is required.`;
  if (/\d/.test(value)) return `${fieldLabel} cannot contain numbers.`;
  if (!namePattern.test(value.trim())) return `${fieldLabel} can only contain letters, hyphens, or apostrophes.`;
  if (value.trim().length < 2) return `${fieldLabel} must be at least 2 characters.`;
  return null;
}

// ── Email validation ──
function validateEmail(value) {
  if (!value.trim()) return 'Email is required.';
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailPattern.test(value.trim())) return 'Please enter a valid email address (e.g. john@example.com).';
  return null;
}

// ── Submit ──
document.getElementById('submit-btn').addEventListener('click', function(e) {
  e.preventDefault();

  const role      = document.getElementById('job-title').value;
  const firstName = document.getElementById('first-name').value;
  const lastName  = document.getElementById('last-name').value;
  const email     = document.getElementById('email').value;
  const hasCV     = fileInfo.style.display === 'flex';

  let valid = true;

  // Job title
  if (!role) {
    setErrorById('job-title', 'Please select a role.');
    valid = false;
  } else {
    clearError(document.getElementById('job-title'));
  }

  // First name
  const firstErr = validateName(firstName, 'First name');
  if (firstErr) { setErrorById('first-name', firstErr); valid = false; }
  else { clearError(document.getElementById('first-name')); }

  // Last name
  const lastErr = validateName(lastName, 'Last name');
  if (lastErr) { setErrorById('last-name', lastErr); valid = false; }
  else { clearError(document.getElementById('last-name')); }

  // Email
  const emailErr = validateEmail(email);
  if (emailErr) { setErrorById('email', emailErr); valid = false; }
  else { clearError(document.getElementById('email')); }

  // CV
  if (!hasCV) { setCVError('Please upload your CV (PDF, DOC, or DOCX).'); valid = false; }
  else { clearCVError(); }

  if (!valid) return;

  sessionStorage.setItem('role',      role);
  sessionStorage.setItem('firstName', firstName);
  sessionStorage.setItem('lastName',  lastName);
  sessionStorage.setItem('email',     email);

  window.location.href = 'thankyou.html';
});
</script>

</body>
</html>
